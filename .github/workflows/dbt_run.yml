name: scheduled_dbt_run

on:
  schedule:
    # Start at 06:00 UTC 
    - cron: '0 6 * * *'
  workflow_dispatch: # Physical run with options
    inputs:
      full_refresh:
        description: 'Run dbt with --full-refresh (Clear silver layer and rebuild)'
        required: false
        type: boolean
        default: false

jobs:
  run_dbt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install dbt-postgres pandas psycopg2-binary requests python-dotenv sqlalchemy
          
      - name: Run Extract & Load (Python)
        env:
          FINGRID_API_KEY: ${{ secrets.FINGRID_API_KEY }}
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: |
          python extract_load.py

      - name: Run dbt
        env:
          DBT_PASSWORD: ${{ secrets.DBT_PASSWORD }}
        run: |
          # profiles.yml
          mkdir -p ~/.dbt
          echo "fin_energy_dbt:
            outputs:
              dev:
                type: postgres
                host: ep-delicate-glitter-a9hiyh3d.gwc.azure.neon.tech
                user: neondb_owner
                pass: $DBT_PASSWORD
                port: 5432
                dbname: neondb
                schema: silver
                threads: 4
                sslmode: require
            target: dev" > ~/.dbt/profiles.yml
          
          
          if [ "${{ github.event.inputs.full_refresh }}" = "true" ]; then
            echo "🚀 Running dbt with FULL REFRESH..."
            dbt run --full-refresh
          else
            echo "⏩ Running dbt normally (incremental)..."
            dbt run
          fi
          
          dbt test
